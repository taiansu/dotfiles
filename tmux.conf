# ~/.tmux.conf

# ============================================================
# 基本設定
# ============================================================

# 改 prefix 從 Ctrl+B 到 Ctrl+A (更順手，跟 screen 一致)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 從 1 開始編號 (0 在鍵盤太遠)
set -g base-index 1
setw -g pane-base-index 1

# 按下 prefix 後顯示時間長一點 (方便看清楚)
set -g display-time 3000

# 減少 escape 延遲 (對 vim 很重要)
set -sg escape-time 0

# 增加 scrollback buffer
set -g history-limit 50000

# 滑鼠支援
set -g mouse on

# 自動重新編號 window
set -g renumber-windows on

# ============================================================
# Vi mode (關鍵設定)
# ============================================================

setw -g mode-keys vi

# Vi-style 複製貼上
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"

# 滑鼠拖曳自動複製
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ============================================================
# Pane 操作 (Vim-style navigation)
# ============================================================

# 分割 pane (更直覺的鍵)
bind \\ split-window -h -c "#{pane_current_path}"  # 垂直分割
bind - split-window -v -c "#{pane_current_path}"  # 水平分割

# 用 hjkl 切換 pane (不需按 prefix)
bind -n M-h select-pane -L  # Alt+h
bind -n M-j select-pane -D  # Alt+j
bind -n M-k select-pane -U  # Alt+k
bind -n M-l select-pane -R  # Alt+l

# 調整 pane 大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================================
# Window 操作
# ============================================================

# 快速切換到上一個 window
bind Space last-window

# 快速建立新 window
bind c new-window -c "#{pane_current_path}"

# ============================================================
# 其他方便的快捷鍵
# ============================================================

# 重新載入設定
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# 快速進入 copy mode
bind Escape copy-mode

# ============================================================
# 色彩設定 (讓 neovim 正常顯示)
# ============================================================

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
